<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Dot Art Creator - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #f0f2f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        
        /* Login Card Style */
        .login-container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .login-container h2 { color: #333; margin-bottom: 10px; font-size: 24px; }
        .login-container p { color: #666; margin-bottom: 30px; font-size: 14px; }
        
        .input-group { position: relative; margin-bottom: 20px; text-align: left; }
        .input-group i { position: absolute; left: 15px; top: 38px; color: #007aff; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #444; font-size: 13px; }
        .input-group input { width: 100%; padding: 12px 15px 12px 40px; border: 1.5px solid #ddd; border-radius: 10px; outline: none; transition: 0.3s; }
        .input-group input:focus { border-color: #007aff; box-shadow: 0 0 8px rgba(0,122,255,0.2); }
        
        .login-btn { background: #007aff; color: white; border: none; padding: 14px; width: 100%; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .login-btn:hover { background: #0056b3; }
        
        /* Main App Style (Hidden by default) */
        #app-section { display: none; width: 100%; max-width: 500px; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        canvas { width: 100%; border: 1px solid #eee; border-radius: 8px; margin-top: 15px; background: white; }
        .control-group { margin: 15px 0; text-align: left; background: #f9f9f9; padding: 15px; border-radius: 12px; }
        label { font-size: 13px; font-weight: bold; color: #666; display: block; margin-bottom: 8px; }
        input[type="range"] { width: 100%; accent-color: #007aff; cursor: pointer; }
        .download-btn { background: #28a745; color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-size: 16px; font-weight: bold; margin-top: 20px; cursor: pointer; }
        
        .error-msg { color: #dc3545; font-size: 13px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="login-container" id="login-section">
    <i class="fas fa-print" style="font-size: 50px; color: #007aff; margin-bottom: 15px;"></i>
    <h2>POS Dot Art</h2>
    <p>කරුණාකර ඔබගේ ගිණුමට ඇතුළු වන්න</p>
    
    <div class="input-group">
        <label>පරිශීලක නාමය (Username)</label>
        <i class="fas fa-user"></i>
        <input type="text" id="username" placeholder="Username ඇතුළත් කරන්න">
    </div>
    
    <div class="input-group">
        <label>මුරපදය (Password)</label>
        <i class="fas fa-lock"></i>
        <input type="password" id="password" placeholder="Password ඇතුළත් කරන්න">
    </div>
    
    <button class="login-btn" onclick="checkLogin()">ඇතුළු වන්න (LOGIN)</button>
    <p id="error" class="error-msg">වැරදි නමක් හෝ මුරපදයක්! නැවත උත්සාහ කරන්න.</p>
</div>

<div id="app-section">
    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3 style="margin: 0; color: #333;">Art Creator</h3>
            <button onclick="logout()" style="background: none; border: none; color: #ff3b30; cursor: pointer; font-weight: bold;">Logout</button>
        </div>
        <hr style="border: 0.5px solid #eee; margin: 15px 0;">
        
        <input type="file" id="upload" accept="image/*" style="margin-bottom: 15px;">
        
        <div class="control-group">
            <label id="dotLabel"><i class="fas fa-braille"></i> තිත් වල ප්‍රමාණය (Dot Size): 4</label>
            <input type="range" id="dotSlider" min="1" max="15" value="4">
        </div>

        <div class="control-group">
            <label><i class="fas fa-adjust"></i> තද ගතිය (Brightness):</label>
            <input type="range" id="contrastSlider" min="0.5" max="2.5" step="0.1" value="1.2">
        </div>

        <canvas id="canvas"></canvas>
        <button class="download-btn" id="saveBtn"><i class="fas fa-download"></i> DOWNLOAD TO PHOTOS</button>
    </div>
</div>

<script>
    // පාලන දත්ත (Login Credentials)
    const VALID_USER = "admin";
    const VALID_PASS = "1234";

    function checkLogin() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        const error = document.getElementById('error');

        if(u === VALID_USER && p === VALID_PASS) {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('app-section').style.display = 'block';
        } else {
            error.style.display = 'block';
        }
    }

    function logout() {
        location.reload(); // පිටුව Refresh කර නැවත Login වෙත යයි
    }

    // --- Original Art Logic ---
    const upload = document.getElementById('upload');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const dotSlider = document.getElementById('dotSlider');
    const contrastSlider = document.getElementById('contrastSlider');
    const dotLabel = document.getElementById('dotLabel');
    const saveBtn = document.getElementById('saveBtn');

    let img = new Image();

    upload.onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (event) => {
            img.onload = render;
            img.src = event.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    [dotSlider, contrastSlider].forEach(s => s.oninput = render);

    function render() {
        if(!img.src) return;
        const dotSize = parseInt(dotSlider.value);
        const contrast = parseFloat(contrastSlider.value);
        dotLabel.innerHTML = `<i class="fas fa-braille"></i> තිත් වල ප්‍රමාණය (Dot Size): ${dotSize}`;

        const printWidth = 576; 
        const scale = printWidth / img.width;
        canvas.width = printWidth;
        canvas.height = img.height * scale;

        const tCanvas = document.createElement('canvas');
        const tCtx = tCanvas.getContext('2d');
        tCanvas.width = canvas.width;
        tCanvas.height = canvas.height;
        tCtx.drawImage(img, 0, 0, tCanvas.width, tCanvas.height);
        
        const pixels = tCtx.getImageData(0, 0, tCanvas.width, tCanvas.height).data;
        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        for (let y = 0; y < canvas.height; y += dotSize) {
            for (let x = 0; x < canvas.width; x += dotSize) {
                let r=0, g=0, b=0, count=0;
                for (let dy=0; dy<dotSize && y+dy<canvas.height; dy++) {
                    for (let dx=0; dx<dotSize && x+dx<canvas.width; dx++) {
                        let i = ((y+dy)*canvas.width + (x+dx))*4;
                        r += pixels[i]; g += pixels[i+1]; b += pixels[i+2];
                        count++;
                    }
                }
                let gray = ((r+g+b)/3) / count;
                gray = ((gray - 128) * contrast) + 128;
                gray = Math.max(0, Math.min(255, gray));
                let radius = (1 - (gray / 255)) * (dotSize / 1.7);
                if (radius > 0.3) {
                    ctx.beginPath();
                    ctx.arc(x + dotSize/2, y + dotSize/2, radius, 0, Math.PI * 2);
                    ctx.fillStyle = "black";
                    ctx.fill();
                }
            }
        }
    }

    saveBtn.onclick = () => {
        if(!img.src) return alert("කරුණාකර රූපයක් තෝරන්න!");
        const dataUrl = canvas.toDataURL("image/png");
        const link = document.createElement('a');
        link.href = dataUrl;
        link.download = 'pos_print_ready.png';
        link.click();
    };
</script>

</body>
</html>

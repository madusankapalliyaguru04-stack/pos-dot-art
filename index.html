<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Dot Art Creator</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f4f7; text-align: center; padding: 15px; margin: 0; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: inline-block; width: 100%; max-width: 400px; box-sizing: border-box; }
        h2 { color: #333; font-size: 1.2rem; margin-bottom: 20px; }
        canvas { width: 100%; border: 1px solid #eee; border-radius: 8px; margin-top: 15px; background: white; }
        .control-group { margin: 15px 0; text-align: left; background: #f9f9f9; padding: 10px; border-radius: 10px; }
        label { font-size: 13px; font-weight: bold; color: #666; display: block; margin-bottom: 5px; }
        input[type="range"] { width: 100%; height: 8px; border-radius: 5px; background: #ddd; accent-color: #007aff; }
        input[type="file"] { width: 100%; margin-bottom: 10px; font-size: 14px; }
        .download-btn { background: #007aff; color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-size: 16px; font-weight: bold; margin-top: 20px; cursor: pointer; }
        .download-btn:active { background: #0056b3; }
    </style>
</head>
<body>

<div class="card">
    <h2>POS Dot Art Creator</h2>
    <input type="file" id="upload" accept="image/*">
    
    <div class="control-group">
        <label id="dotLabel">තිත් වල ප්‍රමාණය (Dot Size): 4</label>
        <input type="range" id="dotSlider" min="1" max="15" value="4">
    </div>

    <div class="control-group">
        <label>තද ගතිය (Brightness/Contrast):</label>
        <input type="range" id="contrastSlider" min="0.5" max="2.5" step="0.1" value="1.2">
    </div>

    <canvas id="canvas"></canvas>
    <button class="download-btn" id="saveBtn">DOWNLOAD TO PHOTOS</button>
</div>

<script>
    const upload = document.getElementById('upload');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const dotSlider = document.getElementById('dotSlider');
    const contrastSlider = document.getElementById('contrastSlider');
    const dotLabel = document.getElementById('dotLabel');
    const saveBtn = document.getElementById('saveBtn');

    let img = new Image();

    upload.onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (event) => {
            img.onload = render;
            img.src = event.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    [dotSlider, contrastSlider].forEach(s => s.oninput = render);

    function render() {
        if(!img.src) return;
        
        const dotSize = parseInt(dotSlider.value);
        const contrast = parseFloat(contrastSlider.value);
        dotLabel.innerText = `තිත් වල ප්‍රමාණය (Dot Size): ${dotSize}`;

        const printWidth = 576; 
        const scale = printWidth / img.width;
        canvas.width = printWidth;
        canvas.height = img.height * scale;

        const tCanvas = document.createElement('canvas');
        const tCtx = tCanvas.getContext('2d');
        tCanvas.width = canvas.width;
        tCanvas.height = canvas.height;
        tCtx.drawImage(img, 0, 0, tCanvas.width, tCanvas.height);
        
        const pixels = tCtx.getImageData(0, 0, tCanvas.width, tCanvas.height).data;

        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        for (let y = 0; y < canvas.height; y += dotSize) {
            for (let x = 0; x < canvas.width; x += dotSize) {
                let r=0, g=0, b=0, count=0;
                
                for (let dy=0; dy<dotSize && y+dy<canvas.height; dy++) {
                    for (let dx=0; dx<dotSize && x+dx<canvas.width; dx++) {
                        let i = ((y+dy)*canvas.width + (x+dx))*4;
                        r += pixels[i]; g += pixels[i+1]; b += pixels[i+2];
                        count++;
                    }
                }
                
                let gray = ((r+g+b)/3) / count;
                gray = ((gray - 128) * contrast) + 128;
                gray = Math.max(0, Math.min(255, gray));

                let radius = (1 - (gray / 255)) * (dotSize / 1.7);

                if (radius > 0.3) {
                    ctx.beginPath();
                    ctx.arc(x + dotSize/2, y + dotSize/2, radius, 0, Math.PI * 2);
                    ctx.fillStyle = "black";
                    ctx.fill();
                }
            }
        }
    }

    saveBtn.onclick = () => {
        if(!img.src) return alert("කරුණාකර රූපයක් තෝරන්න!");
        const dataUrl = canvas.toDataURL("image/png");
        const link = document.createElement('a');
        link.href = dataUrl;
        link.download = 'pos_print_ready.png';
        link.click();
    };
</script>

</body>
</html>

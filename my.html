
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Responsive Live Animated Dashboard</title>
    <style>
        :root {
            --primary: #a3e635;
            --dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.1);
        }

        /* Double click zoom වැළැක්වීමට */
        * { touch-action: manipulation; box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #000;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            transition: background 0.6s ease;
        }

        body.light-on { background-color: #fde047; }

        /* --- LOGIN SECTION --- */
        #login-container {
            display: flex;
            width: 90%;
            max-width: 850px;
            min-height: 450px;
            background: #111;
            border-radius: 20px;
            perspective: 1000px;
            z-index: 10;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        @media (max-width: 768px) {
            #login-container { flex-direction: column; max-width: 400px; }
            .lamp-side { padding: 30px 0; }
        }

        .lamp-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #050505;
            position: relative;
        }

        .lamp-head {
            width: 100px;
            height: 70px;
            background: #333;
            border-radius: 50px 50px 10px 10px;
            transition: 0.4s;
            position: relative;
        }

        body.light-on .lamp-head { background: var(--primary); box-shadow: 0 0 50px var(--primary); }

        .pull-string {
            width: 4px; height: 50px; background: #555;
            position: absolute; left: 20px; top: 70px; cursor: pointer;
        }

        .login-card {
            flex: 1.2; background: var(--dark); padding: 40px;
            color: white; opacity: 0; transform: rotateY(-20deg); transition: 0.8s;
        }

        body.light-on .login-card { opacity: 1; transform: rotateY(0); }

        input {
            width: 100%; padding: 12px; margin: 10px 0;
            background: #1e293b; border: 1px solid #334155;
            color: white; border-radius: 8px; font-size: 16px;
        }

        button {
            width: 100%; padding: 14px; background: var(--primary);
            border: none; border-radius: 8px; font-weight: bold;
            cursor: pointer; margin-top: 10px; font-size: 16px;
        }

        /* --- HOME PAGE SECTION (LIVE ANIMATIONS) --- */
        #home-page {
            display: none;
            width: 100%;
            height: 100vh;
            position: relative;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite; /* නිරන්තරයෙන් දුවන background එක */
            overflow: hidden;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* පාවෙන බෝල (Floating Bubbles) */
        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            bottom: -100px;
            animation: floatUp 10s infinite linear;
            z-index: 1;
        }

        @keyframes floatUp {
            from { transform: translateY(0) rotate(0deg); opacity: 1; }
            to { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }

        .dashboard-content {
            position: relative;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        .grid-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            margin-top: 30px;
        }

        .card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            width: 160px;
            padding: 30px;
            border-radius: 20px;
            color: white;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: 0.3s;
            animation: pulse 3s infinite ease-in-out; /* කාඩ් එකේ ගැහෙන Animation එක */
        }

        .card:hover { transform: translateY(-10px) scale(1.05); background: rgba(255, 255, 255, 0.25); }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(0.98); }
        }

    </style>
</head>
<body>

    <div id="login-container">
        <div class="lamp-side">
            <div class="lamp-head">
                <div class="pull-string" onclick="toggleLight()"></div>
            </div>
            <div style="width:6px; height:80px; background:#222;"></div>
            <div style="width:80px; height:8px; background:#222; border-radius:5px;"></div>
        </div>

        <div class="login-card">
            <h2>Welcome Back</h2>
            <p style="color:#64748b; font-size:14px; margin-bottom:20px;">Admin / 1233</p>
            <input type="text" id="user" placeholder="Username">
            <input type="password" id="pass" placeholder="Password">
            <button onclick="checkLogin()">Get Started 🚀</button>
            <p id="error" style="color:#ff4d4d; display:none; margin-top:10px;">Login Failed!</p>
        </div>
    </div>

    <div id="home-page">
        <div id="bubbles-container"></div>

        <div class="dashboard-content">
            <h1 style="color: white; text-shadow: 0 5px 15px rgba(0,0,0,0.2);">Dashboard Overview</h1>
            <div class="grid-container">
                <div class="card">🏠<br>Home</div>
                <div class="card">📈<br>Growth</div>
                <div class="card">💬<br>Messages</div>
                <div class="card">⚙️<br>Settings</div>
            </div>
            <button onclick="location.reload()" style="max-width:200px; margin-top:40px; background:white; color:#e73c7e;">Logout</button>
        </div>
    </div>

    <script>
        function toggleLight() {
            document.body.classList.toggle('light-on');
        }

        function checkLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;

            if (u === "Admin" && p === "1233") {
                const login = document.getElementById('login-container');
                login.style.opacity = "0";
                login.style.transform = "scale(0.5) rotate(20deg)";
                
                setTimeout(() => {
                    login.style.display = "none";
                    startHome();
                }, 800);
            } else {
                document.getElementById('error').style.display = "block";
            }
        }

        function startHome() {
            document.body.style.background = "none";
            document.getElementById('home-page').style.display = "block";
            createBubbles();
        }

        // පාවෙන බෝල සෑදීමේ logic එක
        function createBubbles() {
            const container = document.getElementById('bubbles-container');
            for (let i = 0; i < 15; i++) {
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                const size = Math.random() * 60 + 20 + 'px';
                bubble.style.width = size;
                bubble.style.height = size;
                bubble.style.left = Math.random() * 100 + '%';
                bubble.style.animationDuration = Math.random() * 5 + 5 + 's';
                bubble.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(bubble);
            }
        }
    </script>
</body>
</html>
